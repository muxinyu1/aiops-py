name: trace-ruoyi-cloud-ruoyi-auth
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/ruoyi-cloud-ruoyi-auth:latest
    container_name: trace-ruoyi-cloud-ruoyi-auth
    restart: unless-stopped
    env_file:
      - ../common.env
    environment:
      OTEL_SERVICE_NAME: ruoyi-cloud-ruoyi-auth
      TRACE_SMOKE_MODE: "true"
      SPRING_PROFILES_ACTIVE: trace-smoke
    ports:
      - "${HOST_PORT:-8080}:8080"
    labels:
      aiops.trace.endpoint: /__trace_smoke
