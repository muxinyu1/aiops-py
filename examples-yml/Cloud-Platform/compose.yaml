name: trace-cloud-platform-ace-admin
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/cloud-platform-ace-admin:latest
    container_name: trace-cloud-platform-ace-admin
    restart: unless-stopped
    env_file:
      - ../common.env
    environment:
      OTEL_SERVICE_NAME: cloud-platform-ace-admin
      TRACE_SMOKE_MODE: "true"
      SPRING_PROFILES_ACTIVE: trace-smoke
      JWT_EXPIRE: "3600"
      JWT_RSA_SECRET: trace-validation
      JWT_TOKEN_HEADER: Authorization
      JWT_PRI_KEY: trace-validation
      JWT_PUB_KEY: trace-validation
    ports:
      - "${HOST_PORT:-8080}:8080"
    labels:
      aiops.trace.endpoint: /__trace_smoke
