name: trace-real-cloud-platform-ace-admin
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/cloud-platform-ace-admin:latest
    container_name: trace-real-cloud-platform-ace-admin
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      OTEL_SERVICE_NAME: cloud-platform-ace-admin
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: trace-validation,local,dev
      EUREKA_HOST: 127.0.0.1
      EUREKA_PORT: "8761"
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      RABBIT_MQ_HOST: 127.0.0.1
      RABBIT_MQ_PORT: "5672"
      JWT_EXPIRE: "3600"
      JWT_RSA_SECRET: trace-validation
      JWT_TOKEN_HEADER: Authorization
      JWT_PRI_KEY: trace-validation
      JWT_PUB_KEY: trace-validation
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.nacos.config.import-check.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --seata.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=trace-validation,local,dev
      - --server.port=8080
      - --spring.application.name=ace-admin
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cloud_admin_v1?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - --spring.datasource.username=root
      - --spring.datasource.password=123456
      - --spring.redis.host=127.0.0.1
      - --spring.redis.port=6379
      - --spring.rabbitmq.host=127.0.0.1
      - --spring.rabbitmq.port=5672
      - --eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
      - --jwt.expire=3600
      - --jwt.rsa-secret=trace-validation
      - --jwt.token-header=Authorization
      - --jwt.pri-key=trace-validation
      - --jwt.pub-key=trace-validation
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      piggymetrics-registry:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /user/front/info
      aiops.trace.mode: real
