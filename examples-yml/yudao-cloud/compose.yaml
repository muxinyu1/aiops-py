name: trace-yudao-cloud-yudao-module-system-server
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/yudao-cloud-yudao-module-system-server:latest
    container_name: trace-yudao-cloud-yudao-module-system-server
    restart: unless-stopped
    env_file:
      - ../common.env
    environment:
      OTEL_SERVICE_NAME: yudao-cloud-yudao-module-system-server
      TRACE_SMOKE_MODE: "true"
      SPRING_PROFILES_ACTIVE: trace-smoke
      YUDAO_INFO_BASE_PACKAGE: cn.iocoder.yudao
      YUDAO_INFO_VERSION: trace-validation
    ports:
      - "${HOST_PORT:-8080}:8080"
    labels:
      aiops.trace.endpoint: /__trace_smoke
