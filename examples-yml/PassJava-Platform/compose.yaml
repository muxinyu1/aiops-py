name: trace-passjava-platform-passjava-member
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/passjava-platform-passjava-member:latest
    container_name: trace-passjava-platform-passjava-member
    restart: unless-stopped
    env_file:
      - ../common.env
    environment:
      OTEL_SERVICE_NAME: passjava-platform-passjava-member
      TRACE_SMOKE_MODE: "true"
      SPRING_PROFILES_ACTIVE: trace-smoke
    ports:
      - "${HOST_PORT:-8080}:8080"
    labels:
      aiops.trace.endpoint: /__trace_smoke
