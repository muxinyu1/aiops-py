name: trace-real-passjava-platform-passjava-member
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/passjava-platform-passjava-member:latest
    container_name: trace-real-passjava-platform-passjava-member
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/opt/trace-agent.jar=packages=com.jackson0714.passjava"
      OTEL_SERVICE_NAME: passjava-platform-passjava-member
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: trace-validation
    volumes:
      - ../../trace-agent/target/trace-agent-1.0.0.jar:/opt/trace-agent.jar:ro
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --eureka.client.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=trace-validation
      - --server.port=8080
      - --spring.application.name=passjava-member
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/passjava_ums?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - --spring.datasource.username=root
      - --spring.datasource.password=123456
      - --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
      - --spring.data.redis.host=127.0.0.1
      - --spring.data.redis.port=6379
      - --spring.redis.host=127.0.0.1
      - --spring.redis.port=6379
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /__trace_smoke
      aiops.trace.mode: real
