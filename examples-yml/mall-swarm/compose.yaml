name: trace-mall-swarm-mall-admin
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/mall-swarm-mall-admin:latest
    container_name: trace-mall-swarm-mall-admin
    restart: unless-stopped
    env_file:
      - ../common.env
    environment:
      OTEL_SERVICE_NAME: mall-swarm-mall-admin
      TRACE_SMOKE_MODE: "true"
      SPRING_PROFILES_ACTIVE: trace-smoke
    ports:
      - "${HOST_PORT:-8080}:8080"
    labels:
      aiops.trace.endpoint: /__trace_smoke
