name: trace-real-zlt-microservices-platform-zlt-uaa
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/zlt-microservices-platform-zlt-uaa:latest
    container_name: trace-real-zlt-microservices-platform-zlt-uaa
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      OTEL_SERVICE_NAME: zlt-microservices-platform-zlt-uaa
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: trace-validation,local,dev
      ZLT_DATASOURCE_IP: 127.0.0.1
      ZLT_DATASOURCE_USERNAME: root
      ZLT_DATASOURCE_PASSWORD: "123456"
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.nacos.config.import-check.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --eureka.client.enabled=false
      - --seata.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=trace-validation,local,dev
      - --server.port=8080
      - --spring.application.name=zlt-uaa
      - --zlt.datasource.ip=127.0.0.1
      - --zlt.datasource.username=root
      - --zlt.datasource.password=123456
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/oauth-center?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
      - --spring.data.redis.host=127.0.0.1
      - --spring.data.redis.port=6379
      - --spring.redis.host=127.0.0.1
      - --spring.redis.port=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /oauth/token
      aiops.trace.mode: real
