name: trace-real-novel-cloud-novel-book-service
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/novel-cloud-novel-book-service:latest
    container_name: trace-real-novel-cloud-novel-book-service
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/opt/trace-agent.jar=packages=io.github.xxyopen.novel"
      OTEL_SERVICE_NAME: novel-cloud-novel-book-service
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: trace-validation,local,dev
      NACOS_ADDR: 127.0.0.1:8848
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.nacos.config.import-check.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --eureka.client.enabled=false
      - --seata.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=trace-validation,local,dev
      - --server.port=8080
      - --spring.application.name=novel-book-service
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/novel?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
      - --spring.data.redis.host=127.0.0.1
      - --spring.data.redis.port=6379
      - --spring.data.redis.password=password
      - --spring.redis.host=127.0.0.1
      - --spring.redis.port=6379
      - --spring.redis.password=password
      - --spring.rabbitmq.host=127.0.0.1
      - --spring.rabbitmq.port=5672
      - --spring.rabbitmq.username=guest
      - --spring.rabbitmq.password=guest
    volumes:
      - ../../trace-agent/target/trace-agent-1.0.0.jar:/opt/trace-agent.jar:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /api/front/book/category/list?workDirection=0
      aiops.trace.mode: real
