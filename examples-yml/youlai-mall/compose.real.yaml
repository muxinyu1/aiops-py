name: trace-real-youlai-mall-youlai-auth
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/youlai-mall-youlai-auth:latest
    container_name: trace-real-youlai-mall-youlai-auth
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/opt/trace-agent.jar=packages=com.youlai"
      OTEL_SERVICE_NAME: youlai-mall-youlai-auth
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: trace-validation,local,dev
      JAVA_OPTS: --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.util.concurrent.locks=ALL-UNNAMED
      SPRING_SECURITY_OAUTH2_AUTHORIZATIONSERVER_TOKEN_URI: http://127.0.0.1:8080/oauth2/token
      WX_MINIAPP_APP_ID: trace-validation
      WX_MINIAPP_APP_SECRET: trace-validation
      CAPTCHA_TYPE: line
      CAPTCHA_WIDTH: "120"
      CAPTCHA_HEIGHT: "40"
      CAPTCHA_INTERFERE_COUNT: "2"
      CAPTCHA_TEXT_ALPHA: "0.8"
      CAPTCHA_EXPIRE_SECONDS: "120"
      CAPTCHA_CODE_TYPE: random
      CAPTCHA_CODE_LENGTH: "4"
      CAPTCHA_FONT_NAME: SansSerif
      CAPTCHA_FONT_WEIGHT: "0"
      CAPTCHA_FONT_SIZE: "32"
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/oauth2_server?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRINGDOC_INFO_TITLE: trace-validation
      SPRINGDOC_INFO_VERSION: trace-validation
      SPRINGDOC_INFO_DESCRIPTION: trace-validation
      SPRINGDOC_INFO_CONTACT_NAME: trace-validation
      SPRINGDOC_INFO_CONTACT_URL: http://127.0.0.1
      SPRINGDOC_INFO_CONTACT_EMAIL: trace@example.invalid
      SPRINGDOC_INFO_LICENSE_NAME: trace-validation
      SPRINGDOC_INFO_LICENSE_URL: http://127.0.0.1
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.nacos.config.import-check.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --eureka.client.enabled=false
      - --seata.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=trace-validation,local,dev
      - --server.port=8080
      - --spring.application.name=youlai-auth
      - --spring.security.oauth2.authorizationserver.token-uri=http://127.0.0.1:8080/oauth2/token
      - --wx.miniapp.app-id=trace-validation
      - --wx.miniapp.app-secret=trace-validation
      - --captcha.type=line
      - --captcha.width=120
      - --captcha.height=40
      - --captcha.interfere-count=2
      - --captcha.text-alpha=0.8
      - --captcha.expire-seconds=120
      - --captcha.code.type=random
      - --captcha.code.length=4
      - --captcha.font.name=SansSerif
      - --captcha.font.weight=0
      - --captcha.font.size=32
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/oauth2_server?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
      - --springdoc.info.title=trace-validation
      - --springdoc.info.version=trace-validation
      - --springdoc.info.description=trace-validation
      - --springdoc.info.contact.name=trace-validation
      - --springdoc.info.contact.url=http://127.0.0.1
      - --springdoc.info.contact.email=trace@example.invalid
      - --springdoc.info.license.name=trace-validation
      - --springdoc.info.license.url=http://127.0.0.1
      - --spring.datasource.password=123456
      - --spring.data.redis.host=127.0.0.1
      - --spring.data.redis.port=6379
      - --spring.data.redis.password=password
      - --spring.redis.host=127.0.0.1
      - --spring.redis.port=6379
      - --spring.redis.password=password
    volumes:
      - ../../trace-agent/target/trace-agent-1.0.0.jar:/opt/trace-agent.jar:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /api/v1/auth/captcha
      aiops.trace.mode: real
