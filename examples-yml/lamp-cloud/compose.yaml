name: trace-lamp-cloud-lamp-oauth-server
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/lamp-cloud-lamp-oauth-server:latest
    container_name: trace-lamp-cloud-lamp-oauth-server
    restart: unless-stopped
    env_file:
      - ../common.env
    environment:
      OTEL_SERVICE_NAME: lamp-cloud-lamp-oauth-server
      TRACE_SMOKE_MODE: "true"
      SPRING_PROFILES_ACTIVE: trace-smoke
      KNIFE4J_ENABLE: "false"
      KNIFE4J_ENABLED: "false"
    ports:
      - "${HOST_PORT:-8080}:8080"
    labels:
      aiops.trace.endpoint: /__trace_smoke
