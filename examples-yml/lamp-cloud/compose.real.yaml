name: trace-real-lamp-cloud-lamp-oauth-server
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/lamp-cloud-lamp-oauth-server:latest
    container_name: trace-real-lamp-cloud-lamp-oauth-server
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/opt/trace-agent.jar=packages=top.tangyh.lamp"
      OTEL_SERVICE_NAME: lamp-cloud-lamp-oauth-server
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: trace-validation,local,dev
      NACOS_IP: 127.0.0.1
      NACOS_PORT: "8848"
      NACOS_NAMESPACE: ""
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nacos
      SEATA_IP: 127.0.0.1
      SEATA_PORT: "8091"
      SEATA_NAMESPACE: ""
      SENTINEL_DASHBOARD: 127.0.0.1:8070
      DATABASE_TYPE: mysql.yml
      KNIFE4J_ENABLE: "false"
      KNIFE4J_ENABLED: "false"
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.nacos.config.import-check.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --eureka.client.enabled=false
      - --seata.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=trace-validation,local,dev
      - --server.port=8080
      - --spring.application.name=lamp-oauth-server
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/lamp_none?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - --spring.redis.host=127.0.0.1
      - --spring.redis.port=6379
      - --spring.rabbitmq.host=127.0.0.1
      - --spring.rabbitmq.port=5672
      - --knife4j.enable=false
      - --knife4j.enabled=false
    volumes:
      - ../../trace-agent/target/trace-agent-1.0.0.jar:/opt/trace-agent.jar:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /anyTenant/captcha
      aiops.trace.mode: real
