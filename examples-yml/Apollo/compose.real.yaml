name: trace-real-apollo-apollo-adminservice
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/apollo-apollo-adminservice:latest
    container_name: trace-real-apollo-apollo-adminservice
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      OTEL_SERVICE_NAME: apollo-apollo-adminservice
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: github,mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/ApolloConfigDB?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_INSTANCE_HOSTNAME: 127.0.0.1
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://127.0.0.1:8761/eureka/
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=github,mysql
      - --server.port=8080
      - --spring.application.name=apollo-adminservice
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ApolloConfigDB?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
      - --eureka.instance.hostname=127.0.0.1
      - --eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /apps/1/accesskeys
      aiops.trace.mode: real
