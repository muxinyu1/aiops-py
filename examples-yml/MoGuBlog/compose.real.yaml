name: trace-real-mogublog-mogu-admin
include:
  - ../_shared/real-deps.compose.yaml
services:
  app:
    image: crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/mogublog-mogu_admin:latest
    container_name: trace-real-mogublog-mogu-admin
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../common-real.env
    environment:
      OTEL_SERVICE_NAME: mogublog-mogu_admin
      TRACE_SMOKE_MODE: "false"
      SPRING_PROFILES_ACTIVE: trace-validation,local,dev
      TOKEN_HEAD: "Bearer "
      TOKEN_HEADER: Authorization
      AUDIENCE_CLIENT_ID: trace-validation
      AUDIENCE_BASE64_SECRET: dHJhY2UtdmFsaWRhdGlvbi1zZWNyZXQ=
      AUDIENCE_NAME: trace-validation
      AUDIENCE_EXPIRES_SECOND: "3600"
      AUDIENCE_REFRESH_SECOND: "7200"
      IS_REMEMBER_ME_EXPIRES_SECOND: "7200"
    command:
      - --spring.config.location=optional:file:/tmp/trace-validation.yml
      - --spring.cloud.bootstrap.enabled=false
      - --spring.cloud.nacos.config.enabled=false
      - --spring.cloud.nacos.discovery.enabled=false
      - --spring.cloud.nacos.config.import-check.enabled=false
      - --spring.cloud.config.enabled=false
      - --spring.cloud.config.import-check.enabled=false
      - --spring.cloud.discovery.enabled=false
      - --spring.cloud.service-registry.auto-registration.enabled=false
      - --eureka.client.enabled=false
      - --seata.enabled=false
      - --spring.main.allow-bean-definition-overriding=true
      - --spring.profiles.active=trace-validation,local,dev
      - --server.port=8080
      - --spring.application.name=mogu-admin
      - --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/mogu_blog?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - --spring.datasource.username=root
      - --spring.datasource.password=123456
      - --spring.datasource.initialSize=0
      - --spring.datasource.minIdle=0
      - --spring.datasource.maxActive=2
      - --spring.datasource.maxWait=60000
      - --spring.datasource.timeBetweenEvictionRunsMillis=60000
      - --spring.datasource.minEvictableIdleTimeMillis=300000
      - --spring.datasource.validationQuery=SELECT 1
      - --spring.datasource.testWhileIdle=true
      - --spring.datasource.testOnBorrow=false
      - --spring.datasource.testOnReturn=false
      - --spring.datasource.poolPreparedStatements=false
      - --spring.datasource.filters=stat
      - --spring.datasource.maxPoolPreparedStatementPerConnectionSize=1
      - --spring.datasource.useGlobalDataSourceStat=true
      - --spring.datasource.connectionProperties=druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500
      - --spring.data.redis.host=127.0.0.1
      - --spring.data.redis.port=6379
      - --spring.redis.host=127.0.0.1
      - --spring.redis.port=6379
      - --spring.rabbitmq.host=127.0.0.1
      - --spring.rabbitmq.port=5672
      - --tokenHead=Bearer 
      - --tokenHeader=Authorization
      - --audience.clientId=trace-validation
      - --audience.base64Secret=dHJhY2UtdmFsaWRhdGlvbi1zZWNyZXQ=
      - --audience.name=trace-validation
      - --audience.expiresSecond=3600
      - --audience.refreshSecond=7200
      - --isRememberMeExpiresSecond=7200
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    labels:
      aiops.trace.endpoint: /index/getWebConfig
      aiops.trace.mode: real
